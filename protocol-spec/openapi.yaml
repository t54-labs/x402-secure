openapi: 3.0.3
info:
  title: x402 Facilitator Proxy - Unified Gateway API
  version: 1.0.0
  description: |
    Unified gateway providing buyer risk APIs and seller x402 proxy functionality.
    This proxy integrates with Trustline risk engine for AI agent payment protection.

    Developed by t54 labs (https://t54.ai)
  contact:
    name: t54 labs
    email: dev@t54.ai
    url: https://t54.ai
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: <TRUSTLINE_API_URL>
    description: Production Trustline API
  - url: http://localhost:8000
    description: Local development server
tags:
  - name: Risk Management
    description: AI agent risk session and trace management endpoints
  - name: x402 Proxy
    description: Payment verification and settlement proxy endpoints
  - name: Internal
    description: Internal endpoints used by the proxy (not for direct client use)
paths:
  /risk/session:
    post:
      summary: Create risk session
      operationId: createRiskSession
      description: |
        Create a new risk session for an AI agent. This session will be used to track
        agent behavior and make risk decisions through Trustline's logic-level assessment.

        Both agent_did and wallet_address are required:
        - agent_did: Agent DID (current phase often same as wallet; future: did:eip8004:...)
        - wallet_address: EVM wallet address (0x...) - current phase; future: multi-chain
        - agent_endpoint: Optional agent callback/base URL
      tags:
        - Risk Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_did, wallet_address]
              properties:
                agent_did:
                  type: string
                  description: Agent DID (currently often same as wallet address; future DID formats)
                wallet_address:
                  type: string
                  description: EVM wallet address (0x...; future multi-chain support)
                agent_endpoint:
                  type: string
                  nullable: true
                  description: Optional agent callback/base URL
                app_id:
                  type: string
                  nullable: true
                device:
                  type: object
                  additionalProperties: true
                  nullable: true
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                required: [sid, expires_at]
                properties:
                  sid: { type: string, format: uuid }
                  expires_at: { type: string, format: date-time }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /risk/trace:
    post:
      summary: Store agent trace for a session
      operationId: createRiskTrace
      description: |
        Store comprehensive agent execution trace including reasoning chains, tool calls,
        and runtime behavior. This data is used by Trustline for logic-level risk assessment
        and evidence-based validation.

        Note: agent_trace must include all required fields (task, parameters, environment,
        events, model_config, session_context, completed_at). See AgentTraceData schema.
      tags:
        - Risk Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sid, agent_trace]
              properties:
                sid:
                  type: string
                  format: uuid
                  description: Session ID from /risk/session
                fingerprint:
                  type: object
                  additionalProperties: true
                  nullable: true
                  description: Browser/device fingerprint (optional)
                telemetry:
                  type: object
                  additionalProperties: true
                  nullable: true
                  description: Additional telemetry data (optional)
                agent_trace:
                  $ref: '#/components/schemas/AgentTraceData'
      responses:
        '200':
          description: Trace stored
          content:
            application/json:
              schema:
                type: object
                required: [tid]
                properties:
                  tid: { type: string, format: uuid }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /risk/trace/{tid}:
    get:
      summary: Query stored agent trace by trace ID
      operationId: getRiskTrace
      tags:
        - Risk Management
      parameters:
        - in: path
          name: tid
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Agent trace data
          content:
            application/json:
              schema:
                type: object
                required: [sid, agent_trace]
                properties:
                  sid:
                    type: string
                    format: uuid
                  fingerprint:
                    type: object
                    additionalProperties: true
                    nullable: true
                  telemetry:
                    type: object
                    additionalProperties: true
                    nullable: true
                  agent_trace:
                    $ref: '#/components/schemas/AgentTraceData'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: object }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /risk/session/{sid}:
    get:
      summary: Query session by session ID
      operationId: getRiskSession
      tags:
        - Risk Management
      parameters:
        - in: path
          name: sid
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Session data
          content:
            application/json:
              schema:
                type: object
                required: [agent_id, expires_at]
                properties:
                  agent_id: { type: string }
                  app_id: { type: string, nullable: true }
                  device: { type: object, additionalProperties: true, nullable: true }
                  expires_at: { type: string, format: date-time }
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: object }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /risk/evaluate:
    post:
      summary: Evaluate payment risk (internal use by proxy)
      operationId: evaluateRisk
      description: |
        Internal endpoint called by proxy to evaluate risk based on session, trace, and payment context.
        In production mode (PROXY_LOCAL_RISK=0), this forwards to Trustline risk engine for:
        - Logic-level evidence evaluation
        - Prompt injection detection
        - Agent behavior analysis
        - Multi-factor risk assessment including code auditing and TEE attestation
      tags:
        - Internal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sid, payment]
              properties:
                sid: { type: string, format: uuid }
                tid: { type: string, format: uuid, nullable: true }
                trace_context:
                  type: object
                  properties:
                    tp: { type: string, description: W3C traceparent }
                    ts: { type: string, description: URL-encoded tracestate, nullable: true }
                mandate: { type: object, additionalProperties: true, nullable: true }
                payment:
                  $ref: '#/components/schemas/PaymentContext'
      responses:
        '200':
          description: Risk evaluation decision
          content:
            application/json:
              schema:
                type: object
                required: [decision, decision_id]
                properties:
                  decision: { type: string, enum: [allow, deny, review] }
                  decision_id: { type: string, format: uuid }
                  ttl_seconds: { type: integer }
                  reasons: { type: array, items: { type: string } }
                  risk_level: { type: string, enum: [high, medium, low], default: low }
                  extra: { type: object, additionalProperties: true }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /internal/x402-secure/facilitator/evaluate:
    post:
      summary: Evaluate an XRPL Facilitator payment through Trustline fast VI-chain verification
      operationId: evaluateInternalFacilitatorPayment
      description: |
        Internal endpoint used by the T54-hosted XRPL x402 Facilitator. The Facilitator
        sends the normalized XRPL payment context plus `extensions.x402Secure`. This
        endpoint preserves `verifiableIntentChain` bytes, computes XRPL binding context,
        and calls Trustline's fast `verifiable-intent/verify-chain` path.

        This endpoint is not used by the Base/Solana Paid API and is not a public
        x402 seller integration surface. If no `x402Secure` extension is present, the
        XRPL Facilitator should bypass this endpoint entirely.
      tags:
        - Internal
      security:
        - InternalBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalFacilitatorEvaluateRequest'
      responses:
        '200':
          description: Gating decision for the Facilitator settle path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalFacilitatorDecisionResponse'
        '401': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /internal/x402-secure/facilitator/evidence-session:
    post:
      summary: Create a Trustline evidence session for legacy VI references
      operationId: createInternalFacilitatorEvidenceSession
      description: |
        Internal helper for the legacy evidence-session flow. Inline L1-L3
        `verifiableIntentChain` payments do not need this handshake.
      tags:
        - Internal
      security:
        - InternalBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalEvidenceSessionRequest'
      responses:
        '200':
          description: Trustline evidence session response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /internal/x402-secure/facilitator/evidence:
    post:
      summary: Upload or record Facilitator evidence for a Trustline session
      operationId: recordInternalFacilitatorEvidence
      tags:
        - Internal
      security:
        - InternalBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalEvidenceUploadRequest'
      responses:
        '200':
          description: Trustline evidence record response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /internal/x402-secure/facilitator/receipt:
    post:
      summary: Record Facilitator settlement receipt metadata in Trustline
      operationId: recordInternalFacilitatorReceipt
      tags:
        - Internal
      security:
        - InternalBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalReceiptRequest'
      responses:
        '200':
          description: Trustline receipt response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /x402/verify:
    post:
      summary: Verify payment with risk gating then forward to upstream facilitator
      operationId: proxyVerify
      description: |
        Verify x402 payment with Trustline risk assessment before forwarding to upstream facilitator.
        Supports AP2 integration through X-AP2-EVIDENCE header for enhanced agent payment protection.
        Risk decisions are made based on agent behavior, mandate compliance, and logic-level analysis.
      tags:
        - x402 Proxy
      parameters:
        - in: header
          name: X-PAYMENT
          required: true
          schema: { type: string }
        - in: header
          name: X-PAYMENT-SECURE
          required: true
          schema: { type: string, description: "w3c.v1;tp=<traceparent>[;ts=<url-encoded-tracestate>]" }
        - in: header
          name: X-RISK-SESSION
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: X-AP2-EVIDENCE
          required: false
          schema: { type: string, description: evd.v1;mr=<ref>;ms=<sha256b64url>;mt=application/json;sz=<bytes> }
        - in: header
          name: Origin
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [x402Version, paymentPayload, paymentRequirements]
              properties:
                x402Version: { type: integer, enum: [1] }
                paymentPayload: { type: object }
                paymentRequirements: { type: object }
      responses:
        '200':
          description: Upstream facilitator response (normalized)
          content:
            application/json:
              schema:
                type: object
                required: [isValid, payer]
                properties:
                  isValid: { type: boolean }
                  payer: { type: string }
                  invalidReason: { type: string, nullable: true }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

  /x402/settle:
    post:
      summary: Settle payment (optional risk gating based on env)
      operationId: proxySettle
      tags:
        - x402 Proxy
      parameters:
        - in: header
          name: X-PAYMENT
          required: true
          schema: { type: string }
        - in: header
          name: X-PAYMENT-SECURE
          required: true
          schema: { type: string }
        - in: header
          name: X-RISK-SESSION
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: X-AP2-EVIDENCE
          required: false
          schema: { type: string }
        - in: header
          name: Origin
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [x402Version, paymentPayload, paymentRequirements]
              properties:
                x402Version: { type: integer, enum: [1] }
                paymentPayload: { type: object }
                paymentRequirements: { type: object }
      responses:
        '200':
          description: Upstream facilitator response (normalized)
          content:
            application/json:
              schema:
                type: object
                required: [success, payer]
                properties:
                  success: { type: boolean }
                  payer: { type: string }
                  transaction: { type: string, nullable: true }
                  network: { type: string, nullable: true }
                  errorReason: { type: string, nullable: true }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }

components:
  securitySchemes:
    InternalBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: internal-token
      description: Internal token shared between the hosted XRPL Facilitator and x402-secure Proxy.

  schemas:
    FacilitatorInfo:
      type: object
      required: [id, network]
      properties:
        id:
          type: string
          example: xrpl-x402-facilitator
        network:
          type: string
          example: xrpl
        environment:
          type: string
          nullable: true
          enum: [production, staging, test, development]

    InternalPolicy:
      type: object
      description: |
        Server-selected X402 Secure policy. `policyId` and `policyVersion` are preserved
        by x402-secure and may be used for Trustline credential routing. Client-supplied
        policy data must be overwritten or tightened by the Facilitator before this call.
      properties:
        policyId:
          type: string
          nullable: true
          example: pol_xrpl_default
        policyVersion:
          type: string
          nullable: true
          example: v1
        requireVerifiableIntent: { type: boolean, default: false }
        requireVerifiedIntent: { type: boolean, default: false }
        requirePaymentMandate: { type: boolean, default: false }
        requireHolderBinding: { type: boolean, default: false }
        requireTrace: { type: boolean, default: false }
        acceptedIssuers:
          type: array
          items: { type: string }
        reviewMode:
          type: string
          enum: [allow, block, review]
          default: block

    InternalPaymentContext:
      type: object
      description: Normalized payment context sent by the XRPL Facilitator.
      properties:
        protocol:
          type: string
          default: x402
        chain:
          type: string
          example: xrpl
        network:
          type: string
          example: xrpl:0
        asset:
          type: string
          example: XRP
        issuer:
          type: string
          nullable: true
        amount:
          oneOf:
            - type: string
            - type: number
          nullable: true
          example: "0.001"
        currency:
          type: string
          nullable: true
        destination:
          type: string
          nullable: true
          example: rMerchant
        payTo:
          type: string
          nullable: true
          example: rMerchant
        resource:
          type: string
          nullable: true
          example: https://merchant.example/resource
        merchantOrigin:
          type: string
          nullable: true
        paymentHash:
          type: string
          nullable: true
        paymentRequirementsHash:
          type: string
          nullable: true
          example: sha256:...
        payloadHash:
          type: string
          nullable: true
          example: sha256:...
        payload:
          type: object
          additionalProperties: true
          description: XRPL signed payment payload or decoded transaction context.
        paymentRequirements:
          type: object
          additionalProperties: true
          description: x402 PaymentRequirements selected by the merchant/facilitator.

    VerifiableIntentReference:
      type: object
      properties:
        format:
          type: string
          default: sd-jwt
        profile:
          type: string
          default: mastercard-vi-v0.1
        presentation:
          type: string
          nullable: true
          description: Inline VI presentation; avoid logging this value.
        presentationRef:
          type: string
          nullable: true
        presentationHash:
          type: string
          nullable: true
        claims:
          type: object
          additionalProperties: true
        constraints:
          type: object
          additionalProperties: true
        layers:
          type: object
          additionalProperties: true
        keyBinding:
          type: object
          additionalProperties: true
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    VerifiableIntentChainNode:
      type: object
      description: One opaque SD-JWT layer. Preserve the string bytes exactly.
      properties:
        format:
          type: string
          nullable: true
          example: sd+jwt
        sdJwt:
          type: string
          nullable: true
          description: Full SD-JWT presentation including disclosures.
        jwt:
          type: string
          nullable: true
          description: Alternate compact JWT field accepted by Trustline's verifier.
      additionalProperties: true

    VerifiableIntentChain:
      type: object
      required: [l1Credential, l2Delegation, l3FinalAction]
      properties:
        l1Credential:
          $ref: '#/components/schemas/VerifiableIntentChainNode'
        l2Delegation:
          $ref: '#/components/schemas/VerifiableIntentChainNode'
        l3FinalAction:
          $ref: '#/components/schemas/VerifiableIntentChainNode'
      additionalProperties: true

    X402SecureExtension:
      type: object
      properties:
        version:
          type: string
          default: x402-secure.vi.v1
        mode:
          type: string
          enum: [optional, enforce]
          nullable: true
        policy:
          $ref: '#/components/schemas/InternalPolicy'
        verifiableIntent:
          $ref: '#/components/schemas/VerifiableIntentReference'
        verifiableIntentChain:
          $ref: '#/components/schemas/VerifiableIntentChain'
        ap2:
          type: object
          additionalProperties: true
          nullable: true
        trace:
          type: object
          additionalProperties: true
          nullable: true

    InternalFacilitatorEvaluateRequest:
      type: object
      required: [facilitator, payment, extensions]
      properties:
        facilitator:
          $ref: '#/components/schemas/FacilitatorInfo'
        payment:
          $ref: '#/components/schemas/InternalPaymentContext'
        extensions:
          type: object
          required: [x402Secure]
          properties:
            x402Secure:
              $ref: '#/components/schemas/X402SecureExtension'
          additionalProperties: true
        merchant:
          type: object
          additionalProperties: true
        buyer:
          type: object
          additionalProperties: true
          properties:
            walletAddress:
              type: string
              nullable: true
            agentId:
              type: string
              nullable: true
        metadata:
          type: object
          additionalProperties: true
          properties:
            developerOrgId:
              type: string
              nullable: true
              description: Server-resolved developer organization id. Used for Trustline credential routing.
            x402SecureRouteId:
              type: string
              nullable: true

    BindingProfileResult:
      type: object
      properties:
        paymentBound: { type: boolean }
        chain: { type: string, nullable: true }
        asset: { type: string, nullable: true }
        issuer: { type: string, nullable: true }
        amount: { type: string, nullable: true }
        destination: { type: string, nullable: true }
        resource: { type: string, nullable: true }
        violations:
          type: array
          items:
            type: object
            additionalProperties: true
        hashes:
          type: object
          additionalProperties:
            type: string
        canonical:
          type: object
          additionalProperties: true

    InternalFacilitatorDecisionResponse:
      type: object
      required: [decision, decision_id]
      properties:
        decision:
          type: string
          enum: [allow, deny, review]
        decision_id:
          type: string
        risk_level:
          type: string
          enum: [low, medium, high]
        ttl_seconds:
          type: integer
          default: 300
        vi:
          type: object
          additionalProperties: true
          description: Fast Trustline VI-chain result mapped into x402-secure response shape.
        binding:
          $ref: '#/components/schemas/BindingProfileResult'
        reasons:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        trustline_assessment:
          type: object
          additionalProperties: true

    InternalEvidenceSessionRequest:
      type: object
      properties:
        facilitator:
          $ref: '#/components/schemas/FacilitatorInfo'
        agentId: { type: string, nullable: true }
        walletAddress: { type: string, nullable: true }
        merchantId: { type: string, nullable: true }
        policy:
          $ref: '#/components/schemas/InternalPolicy'
        requiredEvidence:
          type: array
          items: { type: string }
        expiresInSeconds:
          type: integer
          default: 900
        metadata:
          type: object
          additionalProperties: true

    InternalEvidenceUploadRequest:
      type: object
      required: [sessionId, evidenceType, evidence]
      properties:
        sessionId: { type: string }
        evidenceType: { type: string }
        evidence:
          type: object
          additionalProperties: true
        sha256:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    InternalReceiptRequest:
      type: object
      required: [decisionId]
      properties:
        decisionId: { type: string }
        evidenceRef: { type: string, nullable: true }
        settlementAttemptId: { type: string, nullable: true }
        idempotencyKey: { type: string, nullable: true }
        payment:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true

    PaymentContext:
      type: object
      description: Generic payment context supporting multiple protocols
      required:
        - protocol
        - payload
      properties:
        protocol:
          type: string
          description: 'Payment protocol identifier (e.g., "eip3009", "x402:exact", "solana:transfer", "btc:psbt")'
          example: "eip3009"
        version:
          type: [string, integer]
          nullable: true
          description: Protocol version
        network:
          type: string
          nullable: true
          description: 'Network identifier (e.g., "base-sepolia", "solana-mainnet")'
          example: "base-sepolia"
        payload:
          type: object
          additionalProperties: true
          description: Protocol-specific payload (e.g., authorization, signature)
        headers:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Transport/binding related headers (optional)
        extra:
          type: object
          additionalProperties: true
          nullable: true
          description: Additional metadata (optional)

    AgentTraceData:
      type: object
      description: Complete agent execution trace with all required fields
      required:
        - task
        - parameters
        - environment
        - events
        - model_config
        - session_context
        - completed_at
      properties:
        task:
          type: string
          description: 'Task description (e.g., "Buy BTC price")'
        parameters:
          type: object
          additionalProperties: true
          description: 'Task parameters (e.g., {"symbol": "BTC/USD"})'
        environment:
          type: object
          additionalProperties: true
          description: Environment configuration (e.g., network, seller URL)
        events:
          type: array
          description: List of agent events (user inputs, agent outputs, tool calls, etc.)
          items:
            type: object
            additionalProperties: true
        model_config:
          type: object
          description: LLM model configuration
          additionalProperties: true
          properties:
            provider:
              type: string
              example: "openai"
            model:
              type: string
              example: "gpt-5-mini"
            tools_enabled:
              type: array
              items:
                type: string
        session_context:
          type: object
          description: Session context information
          additionalProperties: true
          properties:
            session_id:
              type: string
              format: uuid
            request_id:
              type: string
              format: uuid
            agent_did:
              type: string
              description: Agent DID (wallet address or EIP-8004 DID)
            client_ip_hash:
              type: string
              description: SHA256 hash of client IP
        completed_at:
          type: string
          format: date-time
          description: Completion timestamp (ISO 8601)

